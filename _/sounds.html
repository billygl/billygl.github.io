<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Sampler Pro - Offline</title>
    <!-- Librerías necesarias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        .animate-shrink { animation: shrink 0.2s linear forwards; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%; background: #ec4899;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Iconos SVG Integrados para máxima compatibilidad
        const IconZap = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconMusic = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>;
        const IconVolume = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
        const IconSquare = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>;
        const IconEdit = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

        const DEFAULT_KICK_B64 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";

        const defaultPads = [
            { id: 1, name: "COUNTDOWN", sub: "7 SEC", url: DEFAULT_KICK_B64, color: "from-pink-500 to-rose-600", key: "1" },
            { id: 2, name: "AIR HORN", sub: "FX 2", url: DEFAULT_KICK_B64, color: "from-purple-500 to-indigo-600", key: "2" },
            { id: 3, name: "LASER", sub: "FX 3", url: DEFAULT_KICK_B64, color: "from-blue-500 to-cyan-600", key: "3" },
            { id: 4, name: "KICK", sub: "Base 1", url: DEFAULT_KICK_B64, color: "from-emerald-500 to-teal-600", key: "4" },
            { id: 5, name: "SNARE", sub: "Base 2", url: DEFAULT_KICK_B64, color: "from-green-500 to-lime-600", key: "5" },
            { id: 6, name: "VOCAL", sub: "Voz FX", url: DEFAULT_KICK_B64, color: "from-yellow-500 to-orange-600", key: "6" },
            { id: 7, name: "BASS", sub: "Grave", url: DEFAULT_KICK_B64, color: "from-orange-500 to-red-600", key: "7" },
            { id: 8, name: "RISER", sub: "Subida", url: DEFAULT_KICK_B64, color: "from-red-500 to-pink-700", key: "8" },
            { id: 9, name: "SCRATCH", sub: "Vinilo", url: DEFAULT_KICK_B64, color: "from-fuchsia-500 to-purple-700", key: "9" },
        ];

        // IndexedDB Logic
        const DB_NAME = 'DJSamplerDatabase';
        const STORE_NAME = 'userAudioPads';
        const initDB = () => new Promise((res, rej) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
            req.onsuccess = () => res(req.result);
            req.onerror = () => rej(req.error);
        });

        const savePadsToDB = async (data) => {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(data, 'current_pads');
        };

        const loadPadsFromDB = async () => {
            const db = await initDB();
            return new Promise(res => {
                const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get('current_pads');
                req.onsuccess = () => res(req.result);
            });
        };

        const App = () => {
            const [volume, setVolume] = useState(0.8);
            const [activePads, setActivePads] = useState({});
            const [pads, setPads] = useState(defaultPads);
            const [editingPad, setEditingPad] = useState(null);
            const [editForm, setEditForm] = useState({ name: '', sub: '' });
            const [toast, setToast] = useState({ show: false, msg: '' });
            const audioInstances = useRef([]);

            useEffect(() => {
                loadPadsFromDB().then(saved => saved && setPads(saved));
            }, []);

            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 2000);
            };

            const playSound = useCallback((pad) => {
                setActivePads(prev => ({ ...prev, [pad.id]: true }));
                const audio = new Audio(pad.url);
                audio.volume = volume;
                audioInstances.current.push(audio);
                audio.onended = () => {
                    setActivePads(prev => ({ ...prev, [pad.id]: false }));
                    audioInstances.current = audioInstances.current.filter(a => a !== audio);
                };
                audio.play().catch(() => showToast("Error de formato"));
                setTimeout(() => setActivePads(prev => ({ ...prev, [pad.id]: false })), 200);
            }, [volume]);

            const stopAll = () => {
                audioInstances.current.forEach(a => { a.pause(); a.currentTime = 0; });
                audioInstances.current = [];
                setActivePads({});
            };

            // FUNCIÓN ACTUALIZADA: Aquí está el cambio clave para WhatsApp/MP4
            const handleFile = (e, padId) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    let b64 = event.target.result;

                    // REPARACIÓN PARA WHATSAPP: 
                    // Si el archivo es mp4 o m4a, forzamos al navegador a reconocerlo como audio
                    if (file.name.toLowerCase().match(/\.(mp4|m4a)$/i)) {
                        b64 = b64.replace(/^data:[^;]*;base64,/, 'data:audio/mp4;base64,');
                    } else if (b64.startsWith('data:application/octet-stream;')) {
                        // Si el sistema no reconoce el tipo, asumimos que es un audio mpeg
                        b64 = b64.replace(/^data:[^;]*;base64,/, 'data:audio/mpeg;base64,');
                    }

                    const updated = pads.map(p => p.id === padId ? { 
                        ...p, 
                        url: b64, 
                        name: file.name.split('.')[0].toUpperCase().substring(0, 12), 
                        sub: 'CARGADO' 
                    } : p);

                    setPads(updated);
                    await savePadsToDB(updated);
                    showToast("Audio Guardado");
                    if(editingPad?.id === padId) setEditForm({ name: file.name.split('.')[0].toUpperCase(), sub: 'CARGADO' });
                };
                reader.readAsDataURL(file);
            };

            const saveInfo = async () => {
                const updated = pads.map(p => p.id === editingPad.id ? { ...p, name: editForm.name.toUpperCase(), sub: editForm.sub.toUpperCase() } : p);
                setPads(updated);
                await savePadsToDB(updated);
                setEditingPad(null);
                showToast("Nombre actualizado");
            };

            return (
                <div className="h-screen w-screen flex flex-col text-white select-none">
                    {/* Header */}
                    <header className="h-14 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-4 shrink-0">
                        <div className="flex items-center gap-2">
                            <div className="p-1.5 bg-pink-600 rounded text-white"><IconZap /></div>
                            <span className="font-bold text-sm tracking-tighter">SAMPLER PRO</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 bg-gray-800 px-3 py-1 rounded-full border border-gray-700">
                                <IconVolume />
                                <input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(e.target.value)} className="w-16 sm:w-24 accent-pink-500" />
                            </div>
                            <button onClick={stopAll} className="p-2 bg-red-600 rounded-lg hover:bg-red-500 active:scale-90"><IconSquare /></button>
                        </div>
                    </header>

                    {/* Grid */}
                    <main className="flex-1 p-2 grid grid-cols-3 grid-rows-3 gap-2">
                        {pads.map(pad => (
                            <div key={pad.id} className="relative h-full w-full">
                                <button 
                                    onClick={() => playSound(pad)}
                                    className={`w-full h-full rounded-xl border flex flex-col items-center justify-center transition-all duration-75 active:scale-95 ${activePads[pad.id] ? `bg-gradient-to-br ${pad.color} border-white shadow-lg` : 'bg-gray-800 border-gray-700 hover:bg-gray-750'}`}
                                >
                                    <IconMusic size={activePads[pad.id] ? 24 : 20} />
                                    <span className="text-[10px] sm:text-xs font-bold mt-1 truncate w-full px-1">{pad.name}</span>
                                    <span className="text-[8px] opacity-50 uppercase tracking-widest">{pad.sub}</span>
                                </button>
                                <button 
                                    onClick={() => { setEditingPad(pad); setEditForm({name: pad.name, sub: pad.sub}); }}
                                    className="absolute top-1 right-1 p-1.5 bg-black/40 rounded-md text-gray-400"
                                ><IconEdit /></button>
                            </div>
                        ))}
                    </main>

                    {/* Toast */}
                    {toast.show && <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-pink-600 px-4 py-2 rounded-full text-sm font-bold shadow-xl animate-bounce">{toast.msg}</div>}

                    {/* Modal */}
                    {editingPad && (
                        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
                            <div className="bg-gray-800 w-full max-w-xs p-6 rounded-2xl border border-gray-700">
                                <h2 className="font-bold text-lg mb-4 flex items-center gap-2 text-pink-500"><IconEdit /> Editar Pad</h2>
                                <label className="block text-[10px] text-gray-400 mb-1">CAMBIAR AUDIO</label>
								<input type="file" accept="audio/*,video/mp4,video/x-m4v,video/*,.m4a,.mp4" onChange={e => handleFile(e, editingPad.id)} className="w-full mb-4 text-xs file:bg-pink-600 file:border-none file:text-white file:px-3 file:py-1 file:rounded file:mr-2 cursor-pointer" />
                                <label className="block text-[10px] text-gray-400 mb-1">NOMBRE</label>
                                <input type="text" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-full bg-gray-900 p-2 rounded border border-gray-700 mb-3 text-sm" />
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingPad(null)} className="flex-1 py-2 bg-gray-700 rounded-lg text-sm">Cerrar</button>
                                    <button onClick={saveInfo} className="flex-1 py-2 bg-pink-600 rounded-lg font-bold text-sm">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
